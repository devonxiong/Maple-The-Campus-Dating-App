name: MapleiOS
options:
  bundleIdPrefix: ai.maplemeet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  Maple:
    type: application
    platform: iOS
    # Pull signing + secret config from an xcconfig you keep out of git.
    configFiles:
      Debug: MapleiOS/Config/Secrets.xcconfig
      Release: MapleiOS/Config/Secrets.xcconfig
    sources:
      - path: MapleiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.maplemeet.app
        INFOPLIST_FILE: MapleiOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
